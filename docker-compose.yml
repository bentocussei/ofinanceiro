services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ofinanceiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ofinanceiro
      POSTGRES_PASSWORD: ofinanceiro
      POSTGRES_DB: ofinanceiro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ofinanceiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: ofinanceiro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
